name: Release (signed APK)

# با push کردن یک تگ مثل v1.0.0 اجرا می‌شود و یک APK امضاشده به یک GitHub Release متصل می‌کند.
# پیش‌نیاز: باید ۴ سیکرت زیر را در تنظیمات ریپازیتوری (Settings > Secrets and variables > Actions) اضافه کنید:
#   KEYSTORE_BASE64      خروجی base64 فایل keystore.jks شما (دستور تولید در پایین همین فایل)
#   KEYSTORE_PASSWORD    رمز عبور keystore
#   KEY_ALIAS            نام alias کلید امضا
#   KEY_PASSWORD         رمز عبور کلید (اگر با رمز keystore یکی است، همان را بگذارید)
#
# ساخت keystore (یک‌بار، روی سیستم خودتان):
#   keytool -genkeypair -v -keystore keystore.jks -alias rialtracker -keyalg RSA -keysize 2048 -validity 10000
#   base64 -w0 keystore.jks > keystore_base64.txt   (محتوای این فایل را در سیکرت KEYSTORE_BASE64 بگذارید)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

jobs:
  release:
    name: Build & release signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "سیکرت KEYSTORE_BASE64 تنظیم نشده - این job نیاز به سیکرت‌های امضا دارد (توضیحات بالای فایل را ببینید)."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore.jks

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --stacktrace \
            -Prialtracker.storeFile="$GITHUB_WORKSPACE/release.keystore.jks" \
            -Prialtracker.storePassword="$KEYSTORE_PASSWORD" \
            -Prialtracker.keyAlias="$KEY_ALIAS" \
            -Prialtracker.keyPassword="$KEY_PASSWORD"

      - name: Rename APK with version
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/*.apk "out/RialTracker-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true

      - name: Clean up keystore
        if: always()
        run: rm -f release.keystore.jks
